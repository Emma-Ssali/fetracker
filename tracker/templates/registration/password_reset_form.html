{% extends 'base.html' %}
{% block content %}

<div style="display:flex; justify-content:center; margin-top:40px;">
    <div style="background:white; border-radius:20px; padding:40px 48px;
                width:100%; max-width:460px;
                box-shadow:0 4px 20px rgba(0,0,0,0.08);">

        <div style="text-align:center; margin-bottom:28px;">
            <div style="font-size:48px;">🔐</div>
            <h3 style="font-weight:700; margin:12px 0 6px; font-size:22px;">
                Reset Password
            </h3>
            <p style="color:#888; font-size:14px; margin:0;">
                Enter your email and we will send you a reset link
            </p>
        </div>

        <hr style="border:none; border-top:1px solid #f0f2f5; margin-bottom:24px;">

        <form method="POST">
            {% csrf_token %}
            <div style="margin-bottom:16px;">
                <label style="font-size:12px; font-weight:600; color:#555;
                              text-transform:uppercase; letter-spacing:0.5px;
                              display:block; margin-bottom:6px;">
                    Email Address
                </label>
                <input type="email" name="email" required
                       placeholder="Enter your email address"
                       style="width:100%; padding:11px 14px; border:1px solid #e5e7eb;
                              border-radius:10px; font-size:14px; color:#1a1a2e;
                              outline:none; box-sizing:border-box;"
                       onfocus="this.style.borderColor='#2193b0'"
                       onblur="this.style.borderColor='#e5e7eb'">
            </div>

            <button type="submit"
                    style="width:100%; padding:12px; background:#1a1a2e; color:white;
                           border:none; border-radius:10px; font-size:15px;
                           font-weight:700; cursor:pointer; margin-top:8px;">
                Send Reset Link
            </button>
        </form>

        <div style="text-align:center; margin-top:20px;">
            <a href="{% url 'login' %}"
               style="color:#2193b0; font-size:13px; text-decoration:none; font-weight:500;">
                ← Back to Login
            </a>
        </div>

    </div>
</div>

<script>
    gsap.from("div > div", { opacity:0, y:40, duration:0.7, delay:0.2, ease:"back.out(1.4)" });
</script>
{% endblock %}
