<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FETracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'dashboard' %}">UGX Tracker</a>
            <div class="d-flex align-items-center gap-2">
                {% if user.is_authenticated %}
                    <a href="{% url 'dashboard' %}"
                       class="btn btn-outline-light btn-sm">Dashboard</a>
                    <a href="{% url 'allocated_funds' %}"
                       class="btn btn-outline-light btn-sm">Allocated Funds</a>
                    <a href="{% url 'expenses' %}"
                       class="btn btn-outline-light btn-sm">Expenses</a>
                    <form method="POST" action="{% url 'logout' %}" style="display:inline;">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-danger btn-sm">Logout</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}"
                       class="btn btn-outline-light btn-sm">Login</a>
                    <a href="{% url 'register' %}"
                       class="btn btn-light btn-sm">Register</a>
                    <a href="{% url 'logout' %}" class="btn btn-outline-danger btn-sm">Logout</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
