{% extends 'base.html' %}
{% block content %}

<div style="display:flex; justify-content:center; margin-top:40px;">
    <div style="background:white; border-radius:20px; padding:40px 48px;
                width:100%; max-width:460px; text-align:center;
                box-shadow:0 4px 20px rgba(0,0,0,0.08);">

        <div style="font-size:56px; margin-bottom:16px;">✅</div>
        <h3 style="font-weight:700; margin:0 0 10px; font-size:22px;">
            Password Reset Successful
        </h3>
        <p style="color:#555; font-size:14px; line-height:1.6; margin:0 0 28px;">
            Your password has been set successfully.
            You can now log in with your new password.
        </p>

        <a href="{% url 'login' %}"
           style="display:inline-block; padding:12px 32px; background:#1a1a2e;
                  color:white; border-radius:10px; text-decoration:none;
                  font-size:14px; font-weight:700;">
            Go to Login
        </a>

    </div>
</div>

<script>
    gsap.from("div > div", { opacity:0, y:40, duration:0.7, delay:0.2, ease:"back.out(1.4)" });
</script>
{% endblock %}
