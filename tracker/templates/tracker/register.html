{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card shadow-lg" style="border-radius: 20px;">
            <div class="card-body p-5">

                <div class="text-center mb-4">
                    <span style="font-size: 48px;">📝</span>
                    <h3 class="fw-bold mt-2">Create an Account</h3>
                    <p class="text-muted">Join FETracker and take control of your finances</p>
                </div>

                <hr>

                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-info">{{ message }}</div>
                    {% endfor %}
                {% endif %}

                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="d-grid mt-4">
                        <button class="btn btn-lg fw-bold text-white"
                                style="background: linear-gradient(135deg, #11998e, #38ef7d);
                                       border-radius: 10px; padding: 12px; color: #1a1a2e !important;">
                            Create Account
                        </button>
                    </div>
                </form>

                <div class="text-center mt-4">
                    <small class="text-muted">
                        Already have an account?
                        <a href="{% url 'login' %}" class="fw-semibold text-decoration-none"
                           style="color: #2193b0;">Login here</a>
                    </small>
                </div>

            </div>
        </div>
    </div>
</div>

<script>
    gsap.from(".card", {
        opacity: 0, y: 50, duration: 0.8, delay: 0.2, ease: "back.out(1.4)"
    });
</script>

{% endblock %}
