<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FETracker — UGX</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }

        body {
            background-color: #f0f2f5;
            color: #1a1a2e;
        }

        .navbar {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%) !important;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            padding: 14px 0;
        }

        .navbar-brand {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #00d4ff !important;
        }

        .navbar .btn-outline-light {
            border-radius: 20px;
            font-size: 13px;
            padding: 5px 16px;
            transition: all 0.3s;
        }

        .navbar .btn-outline-light:hover {
            background: #00d4ff;
            border-color: #00d4ff;
            color: #1a1a2e !important;
        }

        .navbar .btn-outline-danger {
            border-radius: 20px;
            font-size: 13px;
            padding: 5px 16px;
        }

        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .table {
            border-radius: 10px;
            overflow: hidden;
        }

        .table thead th {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .table tbody tr {
            transition: background 0.2s;
        }

        .btn {
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
        }

        .badge {
            font-size: 11px;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 500;
        }

        .alert {
            border-radius: 12px;
            border: none;
        }

        .pagination .page-link {
            border-radius: 8px !important;
            margin: 0 2px;
            border: none;
            color: #1a1a2e;
            font-weight: 500;
        }

        .pagination .page-item.active .page-link {
            background: #1a1a2e;
            color: white;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'dashboard' %}">
                💰 FETracker
            </a>
            <div class="d-flex align-items-center gap-2">
                {% if user.is_authenticated %}
                    <a href="{% url 'dashboard' %}"
                       class="btn btn-outline-light btn-sm">Dashboard</a>
                    <a href="{% url 'allocated_funds' %}"
                       class="btn btn-outline-light btn-sm">Allocated Funds</a>
                    <a href="{% url 'expenses' %}"
                       class="btn btn-outline-light btn-sm">Expenses</a>
                    <form method="POST" action="{% url 'logout' %}" style="display:inline;">
                        {% csrf_token %}
                        <button type="submit"
                                class="btn btn-outline-danger btn-sm">Logout</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}"
                       class="btn btn-outline-light btn-sm">Login</a>
                    <a href="{% url 'register' %}"
                       class="btn btn-light btn-sm">Register</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        // Navbar slides down on every page
        gsap.from(".navbar", {
            y: -80, opacity: 0, duration: 0.7, ease: "power3.out"
        });
        // Container fades up on every page
        gsap.from(".container", {
            y: 30, opacity: 0, duration: 0.6, delay: 0.3, ease: "power2.out"
        });
    </script>
</body>
</html>
