{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body">
                <h3 class="card-title text-center">Create an Account</h3>
                <hr>
                <form method="POST">
                    {% csrf_token %} {{ form.as_p }} <div class="d-grid mt-3">
                        <button class="btn btn-success" type="submit">Sign Up</button>
                    </div>
                </form>
                <div class="mt-3 text-center">
                    <small>Already have an account? <a href="#">Login here</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
