{% extends 'base.html' %}
{% block content %}

<div style="display:flex; justify-content:center; margin-top:40px;">
    <div style="background:white; border-radius:20px; padding:40px 48px;
                width:100%; max-width:460px; text-align:center;
                box-shadow:0 4px 20px rgba(0,0,0,0.08);">

        <div style="font-size:56px; margin-bottom:16px;">📧</div>
        <h3 style="font-weight:700; margin:0 0 10px; font-size:22px;">Check Your Email</h3>
        <p style="color:#555; font-size:14px; line-height:1.6; margin:0 0 24px;">
            We have sent a password reset link to your email address.
            Click the link in the email to set a new password.
        </p>
        <p style="color:#888; font-size:12px; margin:0 0 24px;">
            Did not receive it? Check your spam folder or try again.
        </p>

        <a href="{% url 'password_reset' %}"
           style="display:inline-block; padding:10px 24px; background:#f0f2f5;
                  color:#1a1a2e; border-radius:8px; text-decoration:none;
                  font-size:13px; font-weight:600; margin-right:8px;">
            Try Again
        </a>
        <a href="{% url 'login' %}"
           style="display:inline-block; padding:10px 24px; background:#1a1a2e;
                  color:white; border-radius:8px; text-decoration:none;
                  font-size:13px; font-weight:600;">
            Back to Login
        </a>

    </div>
</div>

<script>
    gsap.from("div > div", { opacity:0, y:40, duration:0.7, delay:0.2, ease:"back.out(1.4)" });
</script>
{% endblock %}
